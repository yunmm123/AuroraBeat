name: Build AuroraBeat

on:
  push:
    tags:
      - 'v*'
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-windows:
    name: Build Windows
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm install
        env:
          ELECTRON_MIRROR: https://npmmirror.com/mirrors/electron/
          ELECTRON_BUILDER_BINARIES_MIRROR: https://npmmirror.com/mirrors/electron-builder-binaries/

      - name: Build
        run: npm run build:win
        env:
          ELECTRON_MIRROR: https://npmmirror.com/mirrors/electron/
          ELECTRON_BUILDER_BINARIES_MIRROR: https://npmmirror.com/mirrors/electron-builder-binaries/

      - name: Upload Windows Installer
        uses: actions/upload-artifact@v7
        with:
          name: AuroraBeat-Windows-Installer
          path: release/AuroraBeat Setup*.exe

      - name: Upload Windows Portable
        uses: actions/upload-artifact@v7
        with:
          name: AuroraBeat-Windows-Portable
          path: release/*portable*.exe
          if-no-files-found: ignore

      - name: Upload Windows Unpacked
        uses: actions/upload-artifact@v7
        with:
          name: AuroraBeat-Windows-Unpacked
          path: release/win-unpacked/

  build-macos:
    name: Build macOS
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm install
        env:
          ELECTRON_MIRROR: https://npmmirror.com/mirrors/electron/
          ELECTRON_BUILDER_BINARIES_MIRROR: https://npmmirror.com/mirrors/electron-builder-binaries/

      - name: Build
        run: npm run build:mac
        env:
          ELECTRON_MIRROR: https://npmmirror.com/mirrors/electron/
          ELECTRON_BUILDER_BINARIES_MIRROR: https://npmmirror.com/mirrors/electron-builder-binaries/

      - name: Upload macOS DMG
        uses: actions/upload-artifact@v7
        with:
          name: AuroraBeat-macOS-DMG
          path: release/*.dmg

      - name: Upload macOS App
        uses: actions/upload-artifact@v7
        with:
          name: AuroraBeat-macOS-App
          path: release/mac/

  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm install
        env:
          ELECTRON_MIRROR: https://npmmirror.com/mirrors/electron/
          ELECTRON_BUILDER_BINARIES_MIRROR: https://npmmirror.com/mirrors/electron-builder-binaries/

      - name: Build
        run: npm run build -- --linux
        env:
          ELECTRON_MIRROR: https://npmmirror.com/mirrors/electron/
          ELECTRON_BUILDER_BINARIES_MIRROR: https://npmmirror.com/mirrors/electron-builder-binaries/

      - name: Upload Linux AppImage
        uses: actions/upload-artifact@v7
        with:
          name: AuroraBeat-Linux-AppImage
          path: release/*.AppImage

      - name: Upload Linux DEB
        uses: actions/upload-artifact@v7
        with:
          name: AuroraBeat-Linux-DEB
          path: release/*.deb

  release:
    name: Create Release
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            AuroraBeat-Windows-Installer/*
            AuroraBeat-Windows-Portable/*
            AuroraBeat-macOS-DMG/*
            AuroraBeat-Linux-AppImage/*
            AuroraBeat-Linux-DEB/*
          generate_release_notes: true
          draft: false
          prerelease: false
