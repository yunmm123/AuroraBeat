    <path d="M40,280 L80,280 L80,280 Q80,340 128,340 Q176,340 176,280 L176,280 L216,280 L216,280 Q216,380 272,380 Q328,380 328,280 L328,280 L368,280 L368,280 Q368,320 400,320 Q432,320 432,280 L432,280 L472,280" 
